name: CI

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

jobs:
    check:
        name: Lint, typecheck & build
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run checks
              run: npm run check
